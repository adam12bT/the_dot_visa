name: Dot Camp – CI/CD → Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    name: Deploy → Hugging Face Space
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://huggingface.co/spaces/adamnouassida5/the_dot_visa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials
          git config --global credential.helper store
          echo "https://adamnouassida5:${HF_TOKEN}@huggingface.co" > ~/.git-credentials

          # Recreate remote to avoid errors if it already exists
          git remote remove hf 2>/dev/null || true
          git remote add hf https://huggingface.co/spaces/adamnouassida5/the_dot_visa

          # Push code
          git push hf main --force

          echo "✅ Deployed to Hugging Face Space"

      - name: Wait for Space to rebuild
        run: |
          SPACE_URL="https://adamnouassida5-the-dot-visa.hf.space"

          echo "⏳ Waiting for Space to rebuild..."
          sleep 60

          for i in $(seq 1 20); do
            STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$SPACE_URL" || true)

            echo "Attempt $i - HTTP $STATUS"

            # 200 = app running
            # 503 = app starting/waking up
            if [[ "$STATUS" == "200" || "$STATUS" == "503" ]]; then
              echo "✅ Space deployment detected."
              exit 0
            fi

            sleep 20
          done

          echo "⚠️ Space is still building."
          echo "Check:"
          echo "https://huggingface.co/spaces/adamnouassida5/the_dot_visa"
          exit 0